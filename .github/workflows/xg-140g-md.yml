name: Build xg-140g-md
on: workflow_dispatch
jobs:
  build:
    name: ${{ matrix.source.tag_prefix }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Shanghai
    strategy:
      fail-fast: false
      matrix:
        source:
          - name: openwrt
            url: https://github.com/openwrt/openwrt/archive/refs/tags/v25.12.4.tar.gz
            tag_prefix: openwrt-xg-140g-md
            cache_key: openwrt
          - name: immortalwrt
            url: https://github.com/immortalwrt/immortalwrt/archive/refs/tags/v25.12.0-rc2.tar.gz
            tag_prefix: immortalwrt-xg-140g-md
            cache_key: immortalwrt
    steps:
      - uses: actions/checkout@v4

      - name: Clean system
        run: |
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android
          sudo -E apt-get -y purge azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell openjdk* adoptopenjdk* mysql* php* mongodb* dotnet* moby* snapd* || true
          sudo -E apt-get -y autoremove --purge && sudo -E apt-get clean

      - name: Install depends
        run: |
          sudo apt update -y
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget ccache

      - name: Clone source
        run: |
          wget ${{ matrix.source.url }}
          tar -xzf *.tar.gz
          mv $(find . -maxdepth 1 -type d -name "openwrt-*" -o -name "immortalwrt-*" | head -1) openwrt
          cd openwrt && ./scripts/getver.sh

      - name: Prepare config and patches
        run: |
          rm -f openwrt/target/linux/generic/backport-6.12/435-v6.19-mtd-spinand-add-support-for-FudanMicro-FM25S01BI3.patch
          mv -f xg-140g-md/patch-25.12 openwrt/
          mv -f xg-140g-md/.config openwrt/
          cd openwrt
          chmod +x patch-25.12/patch.sh && ./patch-25.12/patch.sh
          sed -i 's/dnsmasq/dnsmasq-full/g' include/target.mk

      - name: Cache staging_dir
        uses: actions/cache@v4
        with:
          path: openwrt/staging_dir
          key: ${{ matrix.source.cache_key }}-${{ runner.os }}-${{ hashFiles('openwrt/.config') }}
          restore-keys: ${{ matrix.source.cache_key }}-${{ runner.os }}-

      - name: Update feeds
        run: cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: Download sources
        run: cd openwrt && make defconfig && make -j $(nproc) download

      - name: Enable LuCI and WireGuard
        run: |
          sed -i 's/# CONFIG_PACKAGE_luci is not set/CONFIG_PACKAGE_luci=y/g' openwrt/.config
          sed -i 's/# CONFIG_PACKAGE_luci-app-package-manager is not set/CONFIG_PACKAGE_luci-app-package-manager=y/g' openwrt/.config
          sed -i 's/# CONFIG_PACKAGE_luci-light is not set/CONFIG_PACKAGE_luci-light=y/g' openwrt/.config
          sed -i 's/# CONFIG_PACKAGE_luci-theme-bootstrap is not set/CONFIG_PACKAGE_luci-theme-bootstrap=y/g' openwrt/.config
          sed -i 's/# CONFIG_PACKAGE_luci-proto-wireguard is not set/CONFIG_PACKAGE_luci-proto-wireguard=y/g' openwrt/.config
          sed -i 's/# CONFIG_PACKAGE_kmod-wireguard is not set/CONFIG_PACKAGE_kmod-wireguard=y/g' openwrt/.config
          sed -i 's/# CONFIG_PACKAGE_wireguard-tools is not set/CONFIG_PACKAGE_wireguard-tools=y/g' openwrt/.config
          sed -i 's/# CONFIG_LUCI_LANG_zh_Hans is not set/CONFIG_LUCI_LANG_zh_Hans=y/g' openwrt/.config
          cd openwrt && make defconfig

      - name: Prepare target/linux
        run: cd openwrt && make -j $(nproc) target/linux/{clean,prepare} V=s

      - name: Build ccache
        run: cd openwrt && make -j $(nproc) tools/ccache/compile V=s

      - name: Build firmware
        run: cd openwrt && make -j $(nproc) V=s

      - name: Set datetime
        id: datetime
        run: echo "datetime=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Upload firmware
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{ matrix.source.tag_prefix }}-${{ steps.datetime.outputs.datetime }}
          files: openwrt/bin/targets/airoha/an7581/*
