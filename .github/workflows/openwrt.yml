name: Build xg-140g-md
on: 
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Projects
        uses: actions/checkout@main
      - name: Delete Files
        run: |
          docker rmi `docker images -q`
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d /usr/local/lib/android
          sudo -E apt-get -y purge azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell openjdk* adoptopenjdk* mysql* php* mongodb* dotnet* moby* snapd* || true
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean

      - name: Show system
        run: |
          lscpu
          free -h
          df -Th
          uname -a

      - name: Installation depends
        run: |
          sudo apt update
          sudo apt install build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget
      - name: Clone source code
        run: |
          git clone --depth=1 --branch openwrt-25.12 https://github.com/openwrt/openwrt.git
      - name: Build 
        run: |
          ls -a $GITHUB_WORKSPACE

          mv -f xg-140g-md/01_leds openwrt/target/linux/airoha/an7581/base-files/etc/board.d/
          mv -f xg-140g-md/02_network openwrt/target/linux/airoha/an7581/base-files/etc/board.d/
          mv -f xg-140g-md/330-snand-mtk-bmt-support.patch openwrt/target/linux/mediatek/patches-6.12/
          mv -f xg-140g-md/501-mtd-spinand-FudanMicro-FM25G02B.patch openwrt/target/linux/generic/pending-6.12/
          mv -f xg-140g-md/901-snand-mtk-bmt-support.patch openwrt/target/linux/airoha/patches-6.12/
          mv -f xg-140g-md/an7581-nokia_xg-140g-md.dts openwrt/target/linux/airoha/dts/
          mv -f xg-140g-md/an7581.mk openwrt/target/linux/airoha/image/

          cd openwrt

          ./scripts/feeds update -a
          ./scripts/feeds install -a



          cat > .config << EOF \
          CONFIG_TARGET_airoha=y \
          CONFIG_TARGET_airoha_an7581=y \
          CONFIG_TARGET_airoha_an7581_DEVICE_nokia_xg-140g-md=y
          EOF

          make defconfig

          make download -j $(($(nproc)+1))

          make -j $(($(nproc)+1))
          
      - name: Filter and upload firmware
        run: |
          mkdir openwrt-firmware
          find openwrt/bin/ -type f -name "*xg-140g-md*.itb" -exec cp {} openwrt-firmware/ \;
        working-directory: ${{ github.workspace }}
  
      - name: Set Date and Time
        id: datetime
        run: echo "::set-output name=datetime::$(date +'%Y%m%d%H%M%S')"

      - name: Upload openwrt firmware
        uses: softprops/action-gh-release@master
        with:
          tag_name: openwrt-x64-${{ steps.datetime.outputs.datetime }}
          files: openwrt-firmware/*.*
          
