name: Build xg-140g-md
on: 
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout Projects
        uses: actions/checkout@v2

      - name: Clean up the system
        run: |
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android
          sudo -E apt-get -y purge azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell openjdk* adoptopenjdk* mysql* php* mongodb* dotnet* moby* snapd* || true
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean

      - name: Installation depends
        run: |
          sudo apt update -y
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Clone source code
        run: |
          wget https://github.com/openwrt/openwrt/archive/refs/tags/v25.12.2.tar.gz
          tar -xzf v25.12.2.tar.gz && mv openwrt-25.12.2 openwrt
          cd openwrt/ && ./scripts/getver.sh

      - name: move .config
        run: |
          mv -f xg-140g-md/01_leds openwrt/target/linux/airoha/an7581/base-files/etc/board.d/
          mv -f xg-140g-md/02_network openwrt/target/linux/airoha/an7581/base-files/etc/board.d/
          mv -f xg-140g-md/an7581-nokia_xg-140g-md.dts openwrt/target/linux/airoha/dts/
          mv -f xg-140g-md/an7581.mk openwrt/target/linux/airoha/image/
          mv -f xg-140g-md/.config openwrt/

          mv -f xg-140g-md/121-hack-spi-nand-1b-bbm.patch openwrt/target/linux/airoha/patches-6.12/
          mv -f xg-140g-md/432-drivers-spi-Add-support-for-dynamic-calibration.patch openwrt/target/linux/airoha/patches-6.12/
          mv -f xg-140g-md/433-drivers-spi-mem-Add-spi-calibration-hook.patch openwrt/target/linux/airoha/patches-6.12/
          mv -f xg-140g-md/435-drivers-mtd-spinand-Add-calibration-support-for-spin.patch openwrt/target/linux/airoha/patches-6.12/
          mv -f xg-140g-md/436-drivers-mtd-spi-nor-Add-calibration-support-for-spi-.patch openwrt/target/linux/airoha/patches-6.12/
          mv -f xg-140g-md/495-mtd-spinand-add-support-for-fmsh-FM25G02B.patch openwrt/target/linux/generic/pending-6.12/
          mv -f xg-140g-md/960-asus-hack-u-boot-ignore-mtdparts.patch openwrt/target/linux/airoha/patches-6.12/

          cd openwrt/

          ls -l openwrt/.config || echo ".config NOT FOUND" && make defconfig

      - name: Cache OpenWrt build
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
            openwrt/staging_dir
          key: openwrt-${{ runner.os }}-${{ hashFiles('openwrt/.config') }}
          restore-keys: |
            openwrt-${{ runner.os }}-

      - name: Download
        run: |
          ls -a $GITHUB_WORKSPACE

          cd openwrt/

          ./scripts/feeds update -a && ./scripts/feeds install -a

          make -j $(nproc) download

      - name: Show config
        run: |
          cat openwrt/.config

      - name: target/linux prepare compile
        run: |
          cd openwrt/
          make -j $(nproc) target/linux/{clean,prepare} V=s

      - name: Build
        run: |
          cd openwrt/
          ./scripts/getver.sh

          make -j $(nproc) V=s
  
      - name: Set Date and Time
        id: datetime
        run: echo "::set-output name=datetime::$(date +'%Y%m%d%H%M%S')"

      - name: Upload openwrt firmware
        uses: softprops/action-gh-release@master
        with:
          tag_name: openwrt-xg-140g-md-${{ steps.datetime.outputs.datetime }}
          files: openwrt/bin/targets/airoha/an7581/*
          
