name: sdk
on: 
  workflow_dispatch:
jobs: 
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Projects
      uses: actions/checkout@v2
      
    - name: Installation depends
      run: |
        sudo apt update
        sudo apt install build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-setuptools rsync swig unzip zlib1g-dev file wget
        
    - name: Clone source code
      run: |
        wget https://downloads.openwrt.org/releases/25.12.2/targets/ramips/mt7621/openwrt-sdk-25.12.2-ramips-mt7621_gcc-14.3.0_musl.Linux-x86_64.tar.zst
        tar -I zstd -xvf openwrt-sdk-*.zst && rm -r openwrt-sdk-*.zst

    - name: add custom package
      run: |
        cd openwrt-sdk*
        git clone --depth=1 https://github.com/lmq8267/tunsafe.git
        ls
        cp -r tunsafe/openwrt package/
        cd package && mv openwrt tunsafe
    - name: update feed
      run: |
        cd openwrt-sdk*
        ./scripts/feeds update -a
        ./scripts/feeds install -a

        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: download
      run: |
        cd openwrt-sdk*
        make download -j$(nproc)
        
    - name: build
      run: |
        cd openwrt-sdk*
        make -j$(nproc) package/tunsafe/compile V=99
        
    - name: Upload openwrt firmware
      uses: actions/upload-artifact@master
      with:
        name: openwrt-sdk
        path: openwrt-sdk*/bin/**/*tunsafe*
