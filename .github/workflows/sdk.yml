name: sdk
on: 
  workflow_dispatch:
jobs: 
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Projects
      uses: actions/checkout@v2
      
    - name: Installation depends
      run: |
        sudo apt update
        sudo apt install build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-setuptools rsync swig unzip zlib1g-dev file wget
        
    - name: Clone source code
      run: |
        wget https://github.com/science2468/immortalwrt-IB/releases/download/immortalwrt-xg-140g-md-20260527232731/immortalwrt-sdk-airoha-an7581_gcc-14.3.0_musl.Linux-x86_64.tar.zst
        tar -I zstd -xf immortalwrt-sdk-*.zst && rm -r immortalwrt-sdk-*.zst
        ls

    - name: add custom package
      run: |
        cp -r tunsafe immortalwrt-sdk*/package
        cp -r usque immortalwrt-sdk*/package
        cd immortalwrt-sdk*
        ls package

    - name: update feed
      run: |
        cd immortalwrt-sdk*
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: download
      run: |
        cd immortalwrt-sdk*
        cat > .config <<EOF
        CONFIG_USE_APK=y
        CONFIG_PACKAGE_apk-mbedtls=y
        CONFIG_DEFAULT_openwrt-keyring=y
        EOF

        make defconfig
        make package/tunsafe/download
        make package/usque/download
        
    - name: build
      run: |
        cd immortalwrt-sdk*
        make -j$(nproc) package/tunsafe/{clean,compile} V=s
        make -j$(nproc) package/usque/{clean,compile} V=s
        
    - name: Upload openwrt firmware
      uses: actions/upload-artifact@master
      with:
        name: immortalwrt-sdk
        path: |
          immortalwrt-sdk*/bin/**/*tunsafe*
          immortalwrt-sdk*/bin/**/*usque*
